<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="">
</head>

<body>

    <main class="main-card">
        <header class="header-card">
            <h1>Login</h1>
            <p>Preencha os campos abaixo para fazer login.</p>
        </header>

        <form class="form-login" id="form-login">
            <fieldset class="form-group">
                <legend>Preencha seus dados</legend>

                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="email@exemplo.com" required>

                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" required minlength="8">

                <button type="submit">Login</button>
            </fieldset>
            <p class="p-cadastro">Não possui uma conta? Faça seu <a href="register.html">cadastro</a></p>
        </form>
    </main>

</body>

</html>
